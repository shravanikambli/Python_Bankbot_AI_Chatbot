version: "3.1"

rules:



- rule: user says no after help
  steps:
  - intent: goodbye
  - action: utter_goodbye



- rule: fallback rule
  steps:
  - intent: nlu_fallback
  - action: utter_fallback
  - action: utter_ask_anything_else

- rule: activate balance form
  steps:
  - intent: check_balance
  - action: balance_form
  - active_loop: balance_form


- rule: submit balance form
  condition:
  - active_loop: balance_form
  steps:
  - action: balance_form
  - active_loop: null
  - action: action_check_balance
  - action: utter_ask_anything_else

- rule: activate transfer form
  steps:
  - intent: transfer_money
  - action: transfer_form
  - active_loop: transfer_form


- rule: submit transfer form
  condition:
  - active_loop: transfer_form
  steps:
  - action: transfer_form
  - active_loop: null
  - action: action_transfer_money
  - action: utter_ask_anything_else