<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>User Queries Logs</title>

<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">

<style>
* {
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:'Roboto', sans-serif;
}

body {
    overflow:hidden;
}

/* Sidebar */
.sidebar {
    position:fixed;
    top:0;
    left:0;
    width:300px;
    height:100vh;
    background:#1B1F3B;
    color:white;
    padding-top:20px;
}

.sidebar h2 {
    text-align:center;
    margin-bottom:30px;
}

.sidebar a {
    display:block;
    padding:20px 30px;
    color:white;
    text-decoration:none;
}

.sidebar a:hover {
    background:#2c2f5a;
}

/* Topbar */
.topbar {
    position:fixed;
    top:0;
    left:300px;
    right:0;
    height:60px;
    background:#f8f9fa;
    display:flex;
    align-items:center;
    justify-content:center;
    box-shadow:0 2px 8px rgba(0,0,0,0.15);
}

.topbar button {
    position:absolute;
    right:40px;
    background:#E53935;
    color:white;
    border:none;
    padding:8px 18px;
    border-radius:6px;
    cursor:pointer;
}

/* Main */
.main {
    position:absolute;
    top:60px;
    left:300px;
    right:0;
    bottom:0;
    overflow-y:auto;
    padding:20px;
    background:#f0f2f5;
}

/* Export button */
.export-btn {
   background:#0074D9; 
   color:white;
    border:none;
    padding:10px 18px;
    border-radius:6px;
    cursor:pointer;
    margin-bottom:15px;
}

/* Table */
table {
    width:100%;
    border-collapse:collapse;
    background:white;
}

th, td {
    padding:12px;
    border-bottom:1px solid #ddd;
}

th {
    background:#0074D9;
    color:white;
}

tr:hover {
    background:#f5f5f5;
}
</style>

</head>

<body>

<!-- Sidebar -->
<div class="sidebar">
    <h2>Admin</h2>
    <a href="/admin">Dashboard</a>
    <a href="/training_data">Training Data</a>
    <a href="/user_queries">User Queries</a>
    <a href="/faqs">FAQs</a>
    <a href="/analytics_page">Analytics</a>
</div>

<!-- Topbar -->
<div class="topbar">
    <h2>User Queries Logs</h2>
    <button onclick="logout()">Logout</button>
</div>

<!-- Main -->
<div class="main">

<!-- ✅ Export Button LEFT -->
<button class="export-btn" onclick="exportCSV()">Export CSV</button>

<table>
<thead>
<tr>
    <th>User Message</th>
    <th>Intent</th>
    <th>Confidence</th>
    <th>Bot Response</th>
    <th>Timestamp</th>
</tr>
</thead>

<tbody id="data"></tbody>
</table>

</div>

<script>
// Load logs
fetch("/get_queries")
.then(res => res.json())
.then(data => {
    let table = document.getElementById("data");

    data.forEach(row => {
        table.innerHTML += `
        <tr>
            <td>${row.message}</td>
            <td>${row.intent}</td>
            <td>${row.confidence}</td>
            <td>${row.response}</td>
            <td>${row.timestamp}</td>
        </tr>`;
    });
});

// Export CSV
function exportCSV(){
    window.location.href = "/export_csv";
}

// Logout
function logout(){
    window.location.href="/logout";
}
</script>

</body>
</html>
