<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Admin Login</title>
<link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
<style>
* { margin:0; padding:0; box-sizing:border-box; font-family:'Roboto', sans-serif; }

body {
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
    background: linear-gradient(135deg, #0074D9, #00A8FF); /* static blue gradient */
}

/* --- Login Box --- */
.box {
    background:white;
    padding:50px 40px;
    border-radius:20px;
    box-shadow: 0 15px 35px rgba(0,0,0,0.25);
    text-align:center;
    width: 350px;
    transition: transform 0.3s, box-shadow 0.3s;
}
.box:hover {
    transform: translateY(-5px);
    box-shadow: 0 20px 40px rgba(0,0,0,0.3);
}

/* --- Header --- */
.box h2 {
    margin-bottom:30px;
    color:#060606;
    font-weight:700;
    font-size:28px;
    letter-spacing:1px;
}

/* --- Input Fields --- */
input {
    display:block;
    width:100%;
    padding:14px 15px;
    margin:15px 0;
    border:1px solid #ccc;
    border-radius:12px;
    font-size:16px;
    transition:0.3s;
}
input:focus {
    border-color:#0074D9;
    box-shadow: 0 0 12px rgba(0,116,217,0.3);
    outline:none;
}

/* --- Button --- */
button {
    width:100%;
    padding:14px;
    background:#0074D9;
    color:white;
    border:none;
    border-radius:12px;
    font-size:16px;
    font-weight:600;
    cursor:pointer;
    transition:0.3s;
    margin-top:10px;
}
button:hover {
    background:#005bb5;
}

/* --- Optional: Forgot password link --- */
.forgot {
    display:block;
    margin-top:15px;
    font-size:14px;
    color:#0074D9;
    text-decoration:none;
    transition:0.3s;
}
.forgot:hover {
    text-decoration:underline;
}
</style>
</head>
<body>

<div class="box">
    <h2>Admin Login</h2>
    <form method="POST">
        <input name="username" placeholder="Username" required>
        <input name="password" type="password" placeholder="Password" required>
        <button>Login</button>
    </form>
    <!-- Optional forgot password -->
    <!-- <a href="#" class="forgot">Forgot Password?</a> -->
</div>

</body>
</html>
